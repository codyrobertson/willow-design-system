name: ❓ Question
description: Ask a question about Willow Design System
title: "[Question]: "
labels: ["question", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Have a question about Willow Design System? We're here to help!
        
        **Before asking**, please check:
        - [Documentation](https://willow-design-system.vercel.app)
        - [Storybook](https://willow-design-system.vercel.app/storybook)
        - [Existing Issues](https://github.com/codyrobertson/willow-design-system/issues)
        - [GitHub Discussions](https://github.com/codyrobertson/willow-design-system/discussions)

  - type: dropdown
    id: question-type
    attributes:
      label: Question Type
      description: What type of question do you have?
      options:
        - Usage / How-to
        - Component API
        - Styling / Theming
        - TypeScript
        - Integration
        - Best Practices
        - Troubleshooting
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: Ask your question in detail...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: |
        Help us understand your situation:
        - What are you trying to accomplish?
        - What have you tried so far?
        - Where are you stuck?
      placeholder: Provide context about your question...
    validations:
      required: true

  - type: textarea
    id: code-example
    attributes:
      label: Code Example (if applicable)
      description: If your question involves code, please share a minimal example
      render: typescript
      placeholder: |
        // Share your code here
        import { Button } from 'willow-design-system';
        
        function MyComponent() {
          return <Button>Click me</Button>;
        }
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment (if relevant)
      description: If your question is environment-specific, please share details
      value: |
        - Willow Design System version: 
        - React version: 
        - Next.js version: 
        - TypeScript version: 
        - Operating System: 
        - Browser: 
    validations:
      required: false

  - type: textarea
    id: expected-outcome
    attributes:
      label: Expected Outcome
      description: What result are you hoping to achieve?
      placeholder: Describe what you want to accomplish...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues and discussions for similar questions
          required: true
        - label: I have checked the documentation and Storybook
          required: true
        - label: I have provided enough context for others to understand my question
          required: true