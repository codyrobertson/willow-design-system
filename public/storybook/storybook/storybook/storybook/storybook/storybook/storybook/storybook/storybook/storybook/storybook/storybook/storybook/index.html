<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>storybook - Storybook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    
    <link rel="icon" type="image/svg+xml" href="/storybook/favicon.svg" />
    
    <style>
      @font-face {
        font-family: 'Nunito Sans';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/storybook/sb-common-assets/nunito-sans-regular.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Nunito Sans';
        font-style: italic;
        font-weight: 400;
        font-display: swap;
        src: url('/storybook/sb-common-assets/nunito-sans-italic.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Nunito Sans';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/storybook/sb-common-assets/nunito-sans-bold.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Nunito Sans';
        font-style: italic;
        font-weight: 700;
        font-display: swap;
        src: url('/storybook/sb-common-assets/nunito-sans-bold-italic.woff2') format('woff2');
      }
    </style>

    <link href="/storybook/sb-manager/runtime.js" rel="modulepreload" />

    
    <link href="/storybook/sb-addons/storybook-core-server-presets-0/common-manager-bundle.js" rel="modulepreload" />
    
    <link href="/storybook/sb-addons/docs-1/manager-bundle.js" rel="modulepreload" />
      
    
    <base href="/storybook/">
    <script>
      // Set the base path for runtime requests
      window.__STORYBOOK_ADDONS_CHANNEL__ = window.__STORYBOOK_ADDONS_CHANNEL__ || {};
      window.STORYBOOK_ENV = 'production';
      window.PUBLIC_URL = '/storybook';
      // Override story loading URLs
      window.STORYBOOK_BASE_URL = '/storybook';
      window.__STORYBOOK_STORY_STORE__ = window.__STORYBOOK_STORY_STORE__ || {};
      // Patch the globals for proper URL resolution
      const originalFetch = window.fetch;
      window.fetch = function(url, options) {
        if (typeof url === 'string') {
          if (url === 'index.json' || url === './index.json') {
            url = '/storybook/index.json';
          } else if (url === 'iframe.html' || url === './iframe.html') {
            url = '/storybook/iframe.html';
          } else if (url.startsWith('./') && !url.startsWith('./static/')) {
            url = url.replace('./', '/storybook/');
          }
        }
        return originalFetch.call(this, url, options);
      };
    </script>
   

    <style>
      #storybook-root[hidden] {
        display: none !important;
      }
    </style>

    
  </head>
  <body>
    <div id="root"></div>

    
    <script>
      
        
          window['FEATURES'] = {
  "argTypeTargetsV7": true,
  "legacyDecoratorFileOrder": false,
  "disallowImplicitActionsInRenderV8": true,
  "viewport": true,
  "highlight": true,
  "controls": true,
  "interactions": true,
  "actions": true,
  "backgrounds": true,
  "outline": true,
  "measure": true,
  "storyStoreV7": true,
  "buildStoriesJson": false
};
        
      
        
          window['REFS'] = {};
        
      
        
          window['LOGLEVEL'] = "info";
        
      
        
          window['DOCS_OPTIONS'] = {
  "defaultName": "Docs"
};
        
      
        
          window['CONFIG_TYPE'] = "PRODUCTION";
        
      
        
      
        
      
        
          window['TAGS_OPTIONS'] = {
  "dev-only": {
    "excludeFromDocsStories": true
  },
  "docs-only": {
    "excludeFromSidebar": true
  },
  "test-only": {
    "excludeFromSidebar": true,
    "excludeFromDocsStories": true
  }
};
        
      
        
          window['STORYBOOK_RENDERER'] = "react";
        
      
        
          window['STORYBOOK_BUILDER'] = "@storybook/builder-webpack5";
        
      
        
          window['STORYBOOK_FRAMEWORK'] = "@storybook/nextjs";
        
      
    </script>
    

    <script type="module">
      import '/storybook/sb-manager/globals-runtime.js';

      
        import '/storybook/sb-addons/storybook-core-server-presets-0/common-manager-bundle.js';
      
        import '/storybook/sb-addons/docs-1/manager-bundle.js';
      

      import '/storybook/sb-manager/runtime.js';
    </script>
  </body>
</html>
