[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# Next.js Runtime plugin handles everything automatically
[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

# Ensure registry files are served correctly
[[headers]]
  for = "/r/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"
    Content-Type = "application/json"

# Ensure CDN files are served correctly
[[headers]]
  for = "/cdn/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Font CSS files
[[headers]]
  for = "/cdn/fonts/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Access-Control-Allow-Origin = "*"
    Content-Type = "text/css"
    X-Content-Type-Options = "nosniff"

# Font files - WOFF2 (modern browsers)
[[headers]]
  for = "/cdn/fonts/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Access-Control-Allow-Origin = "*"
    Content-Type = "font/woff2"
    X-Content-Type-Options = "nosniff"

# Font files - OTF (fallback)
[[headers]]
  for = "/cdn/fonts/*.otf"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Access-Control-Allow-Origin = "*"
    Content-Type = "font/otf"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/fonts/*.otf"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Access-Control-Allow-Origin = "*"
    Content-Type = "font/otf"
    X-Content-Type-Options = "nosniff"

# Static assets optimization
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Copy public files to build output
[[redirects]]
  from = "/r/*"
  to = "/r/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/cdn/*"
  to = "/cdn/:splat"
  status = 200
  force = true

# Handle storybook assets
[[redirects]]
  from = "/storybook/*"
  to = "/storybook/:splat"
  status = 200
  force = true

